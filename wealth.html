<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>재물운 평가</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      background: #0a1128;
      color: #E2E8F0;
      font-family: 'Malgun Gothic', 'Apple SD Gothic Neo', sans-serif;
      min-height: 100vh;
    }
    .page-wrap {
      max-width: 520px;
      margin: 0 auto;
      padding: 24px 16px 60px;
    }
    /* 상단 헤더 */
    .top-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 28px;
    }
    .top-title {
      font-size: 11px;
      color: #64748B;
      letter-spacing: 2px;
      text-transform: uppercase;
      margin-bottom: 4px;
    }
    .top-heading {
      font-size: 22px;
      font-weight: 800;
      color: #F1F5F9;
    }
    .back-btn {
      background: #1E293B;
      border: 1px solid #334155;
      color: #94A3B8;
      border-radius: 8px;
      padding: 8px 16px;
      cursor: pointer;
      font-size: 14px;
      text-decoration: none;
      display: inline-block;
      transition: all .2s;
    }
    .back-btn:hover { background: #273549; color: #E2E8F0; }

    /* 사주 요약 */
    .saju-meta {
      background: #0f1e3d;
      border: 1px solid #2a3560;
      border-radius: 12px;
      padding: 14px 16px;
      margin-bottom: 20px;
      font-size: 13px;
      color: #94A3B8;
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      align-items: center;
    }
    .saju-meta span { color: #C9A96E; font-weight: 600; }

    /* 게이지 */
    .gauge-wrap { text-align: center; margin: 8px 0 24px; }
    .tier-badge {
      display: inline-block;
      margin-top: 6px;
      padding: 6px 18px;
      border-radius: 99px;
      font-size: 14px;
      font-weight: 700;
    }

    /* 섹션 카드 */
    .card {
      background: #0f1e3d;
      border: 1px solid #2a3560;
      border-radius: 14px;
      padding: 18px 16px;
      margin-bottom: 16px;
    }
    .card-title {
      font-size: 12px;
      color: #64748B;
      font-weight: 700;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      margin-bottom: 14px;
    }

    /* 점수 바 */
    .w-score-bar-wrap { margin-bottom: 14px; }
    .w-score-bar-label {
      display: flex;
      justify-content: space-between;
      margin-bottom: 5px;
      font-size: 13px;
    }
    .w-score-bar-track {
      height: 8px;
      background: #1E293B;
      border-radius: 99px;
      overflow: hidden;
    }
    .w-score-bar-fill {
      height: 100%;
      border-radius: 99px;
      transition: width .8s ease;
    }
    .stage-items {
      margin-top: 8px;
      font-size: 11px;
      color: #64748B;
      line-height: 1.8;
    }
    .stage-item-row {
      display: flex;
      justify-content: space-between;
      padding: 3px 0;
      border-bottom: 1px solid #1a2545;
    }
    .stage-item-row:last-child { border-bottom: none; }

    /* 교차 조건 */
    .w-cross-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 7px 12px;
      border-radius: 8px;
      margin-bottom: 5px;
      font-size: 13px;
    }
    .cross-title {
      font-size: 13px;
      color: #FF7043;
      font-weight: 700;
      margin-bottom: 10px;
    }

    /* 입력값 */
    .inputs-toggle {
      cursor: pointer;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px 16px;
      background: #1E293B;
      border: 1px solid #334155;
      border-radius: 10px;
      margin-top: 4px;
      user-select: none;
    }
    .inputs-toggle-label { font-size: 13px; font-weight: 600; color: #E2E8F0; }
    .inputs-body {
      display: none;
      margin-top: 4px;
      padding: 14px 16px;
      background: #0F172A;
      border: 1px solid #1E293B;
      border-radius: 10px;
      font-size: 12px;
      color: #94A3B8;
      line-height: 1.9;
    }

    /* 총점 배너 */
    .total-banner {
      background: linear-gradient(135deg, #1a1a3a, #0f1a35);
      border: 1px solid #2a3560;
      border-radius: 14px;
      padding: 20px 16px;
      margin-bottom: 16px;
      text-align: center;
    }
    .total-raw {
      font-size: 12px;
      color: #64748B;
      margin-top: 6px;
    }

    /* 에러 */
    .error-box {
      background: #3a1a1a;
      border: 1px solid #6a2a2a;
      border-radius: 12px;
      padding: 20px;
      color: #f08080;
      font-size: 14px;
      line-height: 1.8;
    }
  </style>
</head>
<body>
<div class="page-wrap">
  <div class="top-bar">
    <div>
      <div class="top-title">사주 재물운</div>
      <div class="top-heading">재물운 평가</div>
    </div>
    <a class="back-btn" onclick="history.back()">← 돌아가기</a>
  </div>
  <div id="content">
    <div style="text-align:center;color:#555;padding:40px">데이터를 불러오는 중...</div>
  </div>
</div>

<script>
const WEALTH_TIER_COLORS = {
  9:'#C6930A', 8:'#D4A017', 7:'#5DA54E', 6:'#6AA84F',
  5:'#6B7280', 4:'#9CA3AF', 3:'#D97706', 2:'#DC2626', 1:'#991B1B'
};

function render(data) {
  const { ip, res, meta } = data;
  const tc = WEALTH_TIER_COLORS[res.percentile.level] || '#6B7280';
  const pad = n => String(n).padStart(2,'0');

  let html = '';

  // 사주 요약
  html += `<div class="saju-meta">
    <span>${meta.year}.${pad(meta.month)}.${pad(meta.day)}</span>
    <span>${pad(meta.hour)}:${pad(meta.minute)}</span>
    <span>${meta.gender === '남' ? '남성' : '여성'}</span>
    <span>${meta.시주 ? meta.시주.hangul : ''} ${meta.일주 ? meta.일주.hangul : ''} ${meta.월주 ? meta.월주.hangul : ''} ${meta.연주 ? meta.연주.hangul : ''}</span>
  </div>`;

  // 게이지
  const pct = Math.min(100, Math.max(0, res.displayScore));
  const R = 80, circ = 2 * Math.PI * R, dash = (pct / 100) * circ;
  html += `<div class="gauge-wrap">
    <svg width="200" height="200" viewBox="0 0 200 200">
      <circle cx="100" cy="100" r="${R}" fill="none" stroke="#1E293B" stroke-width="12"/>
      <circle cx="100" cy="100" r="${R}" fill="none" stroke="${tc}" stroke-width="12"
        stroke-linecap="round" stroke-dasharray="${dash} ${circ}"
        transform="rotate(-90 100 100)" style="transition:stroke-dasharray 1.2s"/>
      <text x="100" y="90" text-anchor="middle" fill="#F1F5F9" style="font-size:38px;font-weight:800;font-family:monospace">${res.displayScore}</text>
      <text x="100" y="112" text-anchor="middle" fill="#64748B" style="font-size:11px">원점수 ${res.clamped}</text>
      <text x="100" y="132" text-anchor="middle" fill="${tc}" style="font-size:13px;font-weight:700">${res.percentile.range}</text>
    </svg>
    <div class="tier-badge" style="background:${tc}22;border:1px solid ${tc}55;color:${tc}">${res.percentile.tier}</div>
  </div>`;

  // 단계별 점수
  html += `<div class="card"><div class="card-title">단계별 점수</div>`;
  for (const st of res.stages) {
    const disp = st.adj !== undefined ? st.adj : st.s;
    const rng = (st.max || 35) - (st.min || 0);
    const p = Math.max(0, Math.min(100, ((disp - (st.min || 0)) / rng) * 100));
    html += `<div class="w-score-bar-wrap">
      <div class="w-score-bar-label">
        <span style="color:#CBD5E1;font-weight:500">${st.label}</span>
        <span style="color:${st.color};font-weight:700;font-family:monospace">${disp > 0 ? '+' : ''}${disp}점${st.adj !== undefined && st.adj !== st.s ? `<span style="color:#94A3B8;font-size:11px;margin-left:4px">(원래 ${st.s})</span>` : ''}</span>
      </div>
      <div class="w-score-bar-track">
        <div class="w-score-bar-fill" style="width:${p}%;background:${st.color}"></div>
      </div>`;
    if (st.items && st.items.length > 0) {
      html += `<div class="stage-items">`;
      for (const it of st.items) {
        html += `<div class="stage-item-row">
          <span>${it.l}</span>
          <span style="color:${it.v >= 0 ? '#4ADE80' : '#F87171'};font-family:monospace">${it.v > 0 ? '+' : ''}${it.v}</span>
        </div>`;
      }
      html += `</div>`;
    }
    html += `</div>`;
  }
  html += `</div>`;

  // 교차 조건
  if (res.cross.items.length > 0) {
    html += `<div class="card">
      <div class="card-title">교차 조건</div>
      <div class="cross-title">${res.cross.items.length}개 발동</div>`;
    for (const c of res.cross.items) {
      if (c.v === null || c.v === undefined) continue;
      html += `<div class="w-cross-item" style="background:${c.v < 0 ? 'rgba(239,68,68,.08)' : 'rgba(34,197,94,.08)'}">
        <span style="color:#CBD5E1">${c.l}</span>
        <span style="color:${c.v < 0 ? '#F87171' : '#4ADE80'};font-family:monospace;font-weight:600">${c.v > 0 ? '+' : ''}${c.v}</span>
      </div>`;
    }
    html += `</div>`;
  }

  // 총점 요약
  html += `<div class="total-banner">
    <div style="font-size:14px;color:#94A3B8;margin-bottom:6px">총점 계산</div>
    <div style="font-size:28px;font-weight:800;color:${tc};font-family:monospace">${res.displayScore}점</div>
    <div class="total-raw">원점수 ${res.rawTotal} → 클램핑 ${res.clamped} → 표시점수 ${res.displayScore}</div>
  </div>`;

  // 자동 추출 입력값
  const boolStr = v => v ? '<span style="color:#4ADE80">✓</span>' : '<span style="color:#475569">✗</span>';
  const inputLines = [
    `재성 있음: ${boolStr(ip.hasJaesung)} / 위치: <b>${ip.jaesungPos||'-'}</b> / 종류: <b>${ip.jaesungType==='jeongjae'?'정재':ip.jaesungType==='pyeonjae'?'편재':'-'}</b> / 개수: <b>${ip.jaesungCount}</b>`,
    `재성=용신: ${boolStr(ip.jaesungIsYongsin)} / 재성=기신: ${boolStr(ip.jaesungIsGisin)}`,
    `식상 있음: ${boolStr(ip.hasSiksangwan)} (<b>${ip.siksangwanType==='siksin'?'식신':ip.siksangwanType==='sanggwan'?'상관':'-'}</b>) / 재성 합: ${boolStr(ip.jaesungHap)}`,
    `신강/신약: <b>${ip.balance==='singang'?'신강':ip.balance==='sinyak'?'신약':'중화'}</b>`,
    `비겁수: <b>${ip.bigyeobCount}</b> / 인성수: <b>${ip.insungCount}</b> / 재성충: ${boolStr(ip.jaesungChung)}`,
    `편관: ${boolStr(ip.hasPyeongwan)} (<b>${ip.pyeongwanPos||'-'}</b>)`,
    `대운재성: ${boolStr(ip.daeunJaesung)} / 대운관살: ${boolStr(ip.daeunGwansal)} / 대운세운합: ${boolStr(ip.daeunSeunHap)}`,
    `세운재성: ${boolStr(ip.seunJaesung)} / 세운관살: ${boolStr(ip.seunGwansal)}`,
    `공망(재성기둥): ${boolStr(ip.gongmang)} / 원진살: ${boolStr(ip.wonjinsal)} / 도화살: ${boolStr(ip.dowhaSal)} / 역마살: ${boolStr(ip.yeokmaSal)}`,
    `역마+공망: ${boolStr(ip.yeokmaGongmang)} / 역마+재성동주: ${boolStr(ip.yeokmaJaesungDongju)}`,
    `도화+편재동주: ${boolStr(ip.dowhaByeonjaeDonju)} / 도화+정재동주: ${boolStr(ip.dowhaJeongjaeDonju)}`,
    `원진+재성동주: ${boolStr(ip.wonjinJaesungDongju)} / 역마+편관동주: ${boolStr(ip.yeokmaPyeongwanDongju)}`,
    `삼합+재성: ${boolStr(ip.samhapJaesung)} / 삼형+재성동주: ${boolStr(ip.samhyeongJaesung)}`,
  ];

  html += `<div class="card" style="padding:0">
    <div class="inputs-toggle" onclick="toggleInputs(this)">
      <span class="inputs-toggle-label">자동 추출된 입력값 보기</span>
      <span style="color:#64748B;font-size:16px">▾</span>
    </div>
    <div class="inputs-body">${inputLines.map(l=>`<div>${l}</div>`).join('')}</div>
  </div>`;

  document.getElementById('content').innerHTML = html;
}

function toggleInputs(btn) {
  const body = btn.nextElementSibling;
  const arrow = btn.querySelector('span:last-child');
  const open = body.style.display === 'none' || body.style.display === '';
  body.style.display = open ? 'block' : 'none';
  arrow.textContent = open ? '▴' : '▾';
}

window.addEventListener('DOMContentLoaded', () => {
  try {
    const raw = localStorage.getItem('wealthData');
    if (!raw) {
      document.getElementById('content').innerHTML = `<div class="error-box">
        데이터가 없습니다.<br>
        메인 페이지에서 사주를 계산하고 <b>재물운 평가</b> 버튼을 눌러주세요.
      </div>`;
      return;
    }
    const data = JSON.parse(raw);
    render(data);
  } catch (e) {
    document.getElementById('content').innerHTML = `<div class="error-box">
      오류가 발생했습니다:<br><b>${e.message}</b><br><br>
      메인 페이지로 돌아가서 다시 시도해주세요.
    </div>`;
    console.error(e);
  }
});
</script>
</body>
</html>
