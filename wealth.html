<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>재물운 평가</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      background: #0a1128;
      color: #E2E8F0;
      font-family: 'Malgun Gothic', 'Apple SD Gothic Neo', sans-serif;
      min-height: 100vh;
    }
    .page-wrap {
      max-width: 520px;
      margin: 0 auto;
      padding: 24px 16px 60px;
    }
    /* 상단 헤더 */
    .top-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 28px;
    }
    .top-title {
      font-size: 11px;
      color: #64748B;
      letter-spacing: 2px;
      text-transform: uppercase;
      margin-bottom: 4px;
    }
    .top-heading {
      font-size: 22px;
      font-weight: 800;
      color: #F1F5F9;
    }
    .back-btn {
      background: #1E293B;
      border: 1px solid #334155;
      color: #94A3B8;
      border-radius: 8px;
      padding: 8px 16px;
      cursor: pointer;
      font-size: 14px;
      text-decoration: none;
      display: inline-block;
      transition: all .2s;
    }
    .back-btn:hover { background: #273549; color: #E2E8F0; }

    /* 사주 요약 */
    .saju-meta {
      background: #0f1e3d;
      border: 1px solid #2a3560;
      border-radius: 12px;
      padding: 14px 16px;
      margin-bottom: 20px;
      font-size: 13px;
      color: #94A3B8;
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      align-items: center;
    }
    .saju-meta span { color: #C9A96E; font-weight: 600; }

    /* 게이지 */
    .gauge-wrap { text-align: center; margin: 8px 0 24px; }
    .tier-badge {
      display: inline-block;
      margin-top: 6px;
      padding: 6px 18px;
      border-radius: 99px;
      font-size: 14px;
      font-weight: 700;
    }

    /* 섹션 카드 */
    .card {
      background: #0f1e3d;
      border: 1px solid #2a3560;
      border-radius: 14px;
      padding: 18px 16px;
      margin-bottom: 16px;
    }
    .card-title {
      font-size: 12px;
      color: #64748B;
      font-weight: 700;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      margin-bottom: 14px;
    }

    /* 점수 바 */
    .w-score-bar-wrap { margin-bottom: 14px; }
    .w-score-bar-label {
      display: flex;
      justify-content: space-between;
      margin-bottom: 5px;
      font-size: 13px;
    }
    .w-score-bar-track {
      height: 8px;
      background: #1E293B;
      border-radius: 99px;
      overflow: hidden;
    }
    .w-score-bar-fill {
      height: 100%;
      border-radius: 99px;
      transition: width .8s ease;
    }
    .stage-items {
      margin-top: 8px;
      font-size: 11px;
      color: #64748B;
      line-height: 1.8;
    }
    .stage-item-row {
      display: flex;
      justify-content: space-between;
      padding: 3px 0;
      border-bottom: 1px solid #1a2545;
    }
    .stage-item-row:last-child { border-bottom: none; }

    /* 교차 조건 */
    .w-cross-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 7px 12px;
      border-radius: 8px;
      margin-bottom: 5px;
      font-size: 13px;
    }
    .cross-title {
      font-size: 13px;
      color: #FF7043;
      font-weight: 700;
      margin-bottom: 10px;
    }

    /* 입력값 */
    .inputs-toggle {
      cursor: pointer;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px 0;
      border-top: 1px solid #1E293B;
      margin-top: 20px;
      user-select: none;
    }
    .inputs-toggle-label { font-size: 12px; font-weight: 600; color: #64748B; letter-spacing: 1px; }
    .inputs-body {
      display: none;
      padding: 10px 0 4px;
      font-size: 12px;
      color: #94A3B8;
      line-height: 2;
    }
    .inputs-body .ip-row {
      display: flex;
      flex-wrap: wrap;
      gap: 4px 16px;
      padding: 4px 0;
      border-bottom: 1px solid rgba(30,41,59,.5);
    }
    .inputs-body .ip-row:last-child { border-bottom: none; }
    .ip-tag {
      display: inline-flex;
      align-items: center;
      gap: 3px;
      font-size: 11.5px;
      color: #64748B;
    }
    .ip-tag b { color: #CBD5E1; font-weight: 600; }

    /* 총점 배너 */
    .total-banner {
      background: linear-gradient(135deg, #1a1a3a, #0f1a35);
      border: 1px solid #2a3560;
      border-radius: 14px;
      padding: 20px 16px;
      margin-bottom: 16px;
      text-align: center;
    }
    .total-raw {
      font-size: 12px;
      color: #64748B;
      margin-top: 6px;
    }

    /* 에러 */
    .error-box {
      background: #3a1a1a;
      border: 1px solid #6a2a2a;
      border-radius: 12px;
      padding: 20px;
      color: #f08080;
      font-size: 14px;
      line-height: 1.8;
    }
  </style>
</head>
<body>
<div class="page-wrap">
  <div class="top-bar">
    <div>
      <div class="top-title">사주 재물운</div>
      <div class="top-heading">재물운 평가</div>
    </div>
    <a class="back-btn" onclick="history.back()">← 돌아가기</a>
  </div>
  <div id="content">
    <div style="text-align:center;color:#555;padding:40px">데이터를 불러오는 중...</div>
  </div>
</div>

<script>
const WEALTH_TIER_COLORS = {
  9:'#C6930A', 8:'#D4A017', 7:'#5DA54E', 6:'#6AA84F',
  5:'#6B7280', 4:'#9CA3AF', 3:'#D97706', 2:'#DC2626', 1:'#991B1B'
};

function render(data) {
  const { ip, res, meta } = data;
  const tc = WEALTH_TIER_COLORS[res.percentile.level] || '#6B7280';
  const pad = n => String(n).padStart(2,'0');
  const fmt = n => { const r = Math.round(n*10)/10; return Number.isInteger(r) ? String(r) : r.toFixed(1); };

  // ── 카테고리 설정 (만점 null = 패널티 카테고리, 바 없음) ──
  const CAL_MAX    = [41, 27, null, 23, 15];
  const CAL_LABELS = ['재성 구조', '생조 구조', '방해 요소', '시기 보정', '보정 요소'];
  const CAL_COLORS = ['#E8B931','#4CAF50','#E53935','#5C6BC0','#AB47BC'];

  // 교차 조건 항목을 type에 따라 분리
  const s1adjItems = (res.cross.items || []).filter(it => it.type === 's1adj');
  const extraItems  = (res.cross.items || []).filter(it => it.type === 'extra');

  // 카테고리별 세부 항목
  const partItems = [
    [...(res.stages[0].items || []), ...s1adjItems],  // 재성 구조 = stage1 + s1adj
    res.stages[1].items || [],                          // 생조 구조
    res.stages[2].items || [],                          // 방해 요소
    res.stages[3].items || [],                          // 시기 보정
    [...(res.stages[4].items || []), ...extraItems],    // 보정 요소 = stage5 + extra
  ];

  // 카테고리 점수 = 해당 항목들의 실제 합산 (음수 가능)
  const catScores = partItems.map(items => {
    const s = items.reduce((a, it) => a + it.v, 0);
    return Math.round(s * 10) / 10;
  });

  // v2.3: calSum ≈ rawTotal, displayedScore = max(30, round(50 + calSum))
  const calSum = Math.round(catScores.reduce((a, b) => a + b, 0) * 10) / 10;
  const displayedScore = Math.min(100, Math.max(30, Math.round(50 + calSum)));

  let html = '';

  // 사주 요약
  html += `<div class="saju-meta">
    <span>${meta.year}.${pad(meta.month)}.${pad(meta.day)}</span>
    <span>${pad(meta.hour)}:${pad(meta.minute)}</span>
    <span>${meta.gender === '남' ? '남성' : '여성'}</span>
    <span>${meta.시주 ? meta.시주.hangul : ''} ${meta.일주 ? meta.일주.hangul : ''} ${meta.월주 ? meta.월주.hangul : ''} ${meta.연주 ? meta.연주.hangul : ''}</span>
  </div>`;

  // 게이지
  const pct = Math.min(100, Math.max(0, displayedScore));
  const R = 80, circ = 2 * Math.PI * R, dash = (pct / 100) * circ;
  html += `<div class="gauge-wrap">
    <svg width="200" height="200" viewBox="0 0 200 200">
      <circle cx="100" cy="100" r="${R}" fill="none" stroke="#1E293B" stroke-width="12"/>
      <circle cx="100" cy="100" r="${R}" fill="none" stroke="${tc}" stroke-width="12"
        stroke-linecap="round" stroke-dasharray="${dash} ${circ}"
        transform="rotate(-90 100 100)" style="transition:stroke-dasharray 1.2s"/>
      <text x="100" y="92" text-anchor="middle" fill="#F1F5F9" style="font-size:38px;font-weight:800;font-family:monospace">${displayedScore}</text>
      <text x="100" y="130" text-anchor="middle" fill="${tc}" style="font-size:13px;font-weight:700">${res.percentile.range}</text>
    </svg>
    <div class="tier-badge" style="background:${tc}22;border:1px solid ${tc}55;color:${tc}">${res.percentile.tier}</div>
  </div>`;

  // ── 재물운 분석 ──
  html += `<div class="card"><div class="card-title">재물운 분석</div>`;
  for (let i = 0; i < 5; i++) {
    const score = catScores[i];
    const maxVal = CAL_MAX[i];
    let scoreHtml, barHtml;
    if (maxVal !== null) {
      // 만점이 있는 카테고리: "X / Ymax점" + 진행 바
      const barPct = Math.max(0, Math.min(100, score / maxVal * 100));
      scoreHtml = `<span style="color:${CAL_COLORS[i]};font-weight:700;font-family:monospace">${fmt(score)} / ${maxVal}max점</span>`;
      barHtml = `<div class="w-score-bar-track">
        <div class="w-score-bar-fill" style="width:${barPct}%;background:${CAL_COLORS[i]}"></div>
      </div>`;
    } else {
      // 패널티 카테고리 (방해 요소 등): 바 없이 점수만 빨간색으로
      scoreHtml = `<span style="color:#F87171;font-weight:700;font-family:monospace">${fmt(score)}pt</span>`;
      barHtml = '';
    }
    html += `<div class="w-score-bar-wrap">
      <div class="w-score-bar-label">
        <span style="color:#CBD5E1;font-weight:500">${CAL_LABELS[i]}</span>
        ${scoreHtml}
      </div>
      ${barHtml}`;
    if (partItems[i].length > 0) {
      html += `<div class="stage-items">`;
      for (const it of partItems[i]) {
        html += `<div class="stage-item-row">
          <span>${it.l}</span>
          <span style="color:${it.v >= 0 ? '#4ADE80' : '#F87171'};font-family:monospace">${it.v > 0 ? '+' : ''}${fmt(it.v)}</span>
        </div>`;
      }
      html += `</div>`;
    }
    html += `</div>`;
  }
  html += `</div>`;

  // 총점 배너
  const bannerParts = `기본(50) + 재성(${fmt(catScores[0])}) + 생조(${fmt(catScores[1])}) + 방해(${fmt(catScores[2])}) + 시기(${fmt(catScores[3])}) + 보정(${fmt(catScores[4])}) = ${displayedScore}점`;
  html += `<div class="total-banner">
    <div style="font-size:14px;color:#94A3B8;margin-bottom:6px">종합 점수</div>
    <div style="font-size:28px;font-weight:800;color:${tc};font-family:monospace">${displayedScore}점</div>
    <div style="font-size:12px;color:#475569;margin-top:8px">${bannerParts}</div>
  </div>`;

  // 자동 추출 입력값
  const ok = v => v ? '<span style="color:#4ADE80">✓</span>' : '<span style="color:#334155">—</span>';
  const tag = (label, val) => `<span class="ip-tag">${label} ${val}</span>`;
  const bTag = (label, v) => tag(label, v ? '<span style="color:#4ADE80">✓</span>' : '<span style="color:#334155">—</span>');

  const inputRows = [
    [tag('재성', ok(ip.hasJaesung)),
     tag('위치', `<b>${ip.jaesungPos||'—'}</b>`),
     tag('종류', `<b>${ip.jaesungType==='jeongjae'?'정재':ip.jaesungType==='pyeonjae'?'편재':'—'}</b>`),
     tag('개수', `<b>${ip.jaesungCount}</b>`)],
    [bTag('용신', ip.jaesungIsYongsin), bTag('기신', ip.jaesungIsGisin),
     tag('신강/약', `<b>${ip.balance==='singang'?'신강':ip.balance==='sinyak'?'신약':'중화'}</b>`)],
    [tag('식상', `${ok(ip.hasSiksangwan)} <b>${ip.siksangwanType==='siksin'?'식신':ip.siksangwanType==='sanggwan'?'상관':'—'}</b>`),
     bTag('재성합', ip.jaesungHap), bTag('재성충', ip.jaesungChung)],
    [tag('비겁', `<b>${ip.bigyeobCount}</b>`), tag('인성', `<b>${ip.insungCount}</b>`),
     tag('편관', `${ok(ip.hasPyeongwan)} <b>${ip.pyeongwanPos||'—'}</b>`)],
    [bTag('대운재성', ip.daeunJaesung), bTag('대운관살', ip.daeunGwansal), bTag('대운세운합', ip.daeunSeunHap)],
    [bTag('세운재성', ip.seunJaesung), bTag('세운관살', ip.seunGwansal)],
    [bTag('공망', ip.gongmang), bTag('원진살', ip.wonjinsal), bTag('도화살', ip.dowhaSal), bTag('역마살', ip.yeokmaSal)],
    [bTag('역마+공망', ip.yeokmaGongmang), bTag('역마+재성', ip.yeokmaJaesungDongju),
     bTag('삼합+재성', ip.samhapJaesung), bTag('삼형+재성', ip.samhyeongJaesung)],
  ];

  html += `<div class="inputs-toggle" onclick="toggleInputs(this)">
    <span class="inputs-toggle-label">자동 추출 입력값</span>
    <span style="color:#475569;font-size:14px">▾</span>
  </div>
  <div class="inputs-body">${inputRows.map(row=>`<div class="ip-row">${row.join('')}</div>`).join('')}</div>`;

  document.getElementById('content').innerHTML = html;
}

function toggleInputs(btn) {
  const body = btn.nextElementSibling;
  const arrow = btn.querySelector('span:last-child');
  const open = body.style.display === 'none' || body.style.display === '';
  body.style.display = open ? 'block' : 'none';
  arrow.textContent = open ? '▴' : '▾';
}

window.addEventListener('DOMContentLoaded', () => {
  try {
    const raw = localStorage.getItem('wealthData');
    if (!raw) {
      document.getElementById('content').innerHTML = `<div class="error-box">
        데이터가 없습니다.<br>
        메인 페이지에서 사주를 계산하고 <b>재물운 평가</b> 버튼을 눌러주세요.
      </div>`;
      return;
    }
    const data = JSON.parse(raw);
    render(data);
  } catch (e) {
    document.getElementById('content').innerHTML = `<div class="error-box">
      오류가 발생했습니다:<br><b>${e.message}</b><br><br>
      메인 페이지로 돌아가서 다시 시도해주세요.
    </div>`;
    console.error(e);
  }
});
</script>
</body>
</html>
